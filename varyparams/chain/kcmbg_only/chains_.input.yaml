theory:
  like_kxg.CCL:
    transfer_function: boltzmann_camb
    matter_pk: linear
    baryons_pk: nobaryons
    output_params:
    - sigma8
likelihood:
  like_kxg.like_kxg:
    magnification: 'False'
    pzshift: 'False'
    pzshift_only: 'False'
    input_file: /home/r/rbond/gmarques/wa_wo/sacc_fiducial_xCMB_boosterrors.fits
    tracers:
    - gc__0
    - gc__1
    - gc__2
    - gc__3
    - gc__4
    - Kappacv
    tracer_combinations:
      (gc__0, Kappacv):
        lmin: 5
        lmax: 170
      (gc__1, Kappacv):
        lmin: 5
        lmax: 263
      (gc__2, Kappacv):
        lmin: 5
        lmax: 347
      (gc__3, Kappacv):
        lmin: 5
        lmax: 422
      (gc__4, Kappacv):
        lmin: 5
        lmax: 488
    defaults:
      lmin: 107
      lmax: 1000
      input_params_prefix: xcorr
params:
  sigma8:
    latex: \sigma_8
    derived: true
  Omega_c:
    prior:
      min: 0.1
      max: 0.8
    latex: \Omega_c
  Omega_b:
    prior:
      min: 0.03
      max: 0.07
    latex: \Omega_b
  h:
    prior:
      min: 0.55
      max: 0.91
    latex: h
  n_s:
    prior:
      min: 0.87
      max: 1.07
    latex: n_s
  A_sE9:
    prior:
      min: 0.5
      max: 5.0
    latex: A_s
  m_nu: 0.0
  w0: -1
  wa: 0.0
  Omega_m:
    derived: 'lambda Omega_c,Omega_b : (Omega_c+Omega_b)'
    latex: \Omega_m
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8*(Omega_m/0.3)**0.5'
    latex: \sigma_8 (\Omega_\mathrm{m}/0.3)^{0.5}
  xcorr_gc__0_b: 1.0
  xcorr_gc__1_b: 1.1
  xcorr_gc__2_b: 1.2
  xcorr_gc__3_b: 1.5
  xcorr_gc__4_b: 2.0
sampler:
  mcmc:
    learn_every: 20d
    learn_proposal_Rminus1_max_early: 50.0
    learn_proposal_Rminus1_max: 30.0
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    proposal_scale: 1.9
    max_tries: 1000000
stop_at_error: true
output: chains_
